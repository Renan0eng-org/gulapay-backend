spring:
  application:
    name: foodservice-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: America/Sao_Paulo
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

app:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_DEV_SECRET_USE_AT_LEAST_32_CHARS_FOR_HS256}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
      issuer: foodservice-api
