spring:
  datasource:
    url: jdbc:h2:mem:foodservice_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt:
      secret: TEST_SECRET_NEVER_USE_THIS_VALUE_IN_PRODUCTION_FOR_REAL
      expiration-minutes: 60
