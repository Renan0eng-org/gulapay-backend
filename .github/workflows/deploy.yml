name: Build and Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/gulapay-backend:latest

      - name: Deploy on server (pull and restart)
        run: |
          docker pull devnardi/gulapay-backend:latest && \
          docker stop gulapay-backend || true && \
          docker rm gulapay-backend || true && \
          docker run -d --name gulapay-backend --network gulapay-network -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e DB_URL=jdbc:postgresql://gulapay-postgres:5432/gulapay \
            -e DB_USER=postgres \
            -e DB_PASSWORD=1234 \
            -e JWT_SECRET=gulapay_super_secret_key_2026_backend_security_very_strong \
            devnardi/gulapay-backend:latest
