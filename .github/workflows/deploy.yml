name: Build and Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/gulapay-backend:latest

      - name: Deploy on server (pull and restart)
        run: |
          docker pull ${{ secrets.DOCKERHUB_USER }}/gulapay-backend:latest
          docker stop gulapay-backend || true
          docker rm gulapay-backend || true
          docker run -d --name gulapay-backend \
            -p 8080:8080 \
            --env SPRING_PROFILES_ACTIVE=dev \
            --env DB_URL=jdbc:postgresql://gulapay-postgres:5432/foodservice \
            --env DB_USER=postgres \
            --env DB_PASSWORD=postgres \
            --env JWT_SECRET=${{ secrets.JWT_SECRET }} \
            ${{ secrets.DOCKERHUB_USER }}/gulapay-backend:latest
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
